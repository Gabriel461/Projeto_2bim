<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Cadastro</title>
    <style>
       * {
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        
       } 
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: url(https://images5.alphacoders.com/798/thumb-1920-798722.png);
    }

    .container {
        width: 420px;
        background-color: transparent;
        border: 3px solid gray;
        border-radius: 30px;
        padding: 30px;
        backdrop-filter: blur(5px);
        
    }

    .container h1 {
        font-size: 40px;
        text-align: center;
        color: white;
        
    }

    .box {
        position: relative;
        width: 100%;
        height: 50px;
        margin: 30px;
    }

    .box input{
        width: 100%;
        height: 100%;
        background-color: transparent;
        border: none;
        border-radius: 20px ;
        font-size: 20px;
        color: white;

    }

    button {
        width: 100%;
        height: 50px;
        font-size: 20px;
        border-radius: 20px;
        border: white;
        cursor: pointer;
    }

    </style>
</head>
<body>
    <main class="container">
        <form id="cadastro">
            <h1>Cadastro</h1>
            <div class="box">
                <input id="name" placeholder="Usuário" type="text">
            </div>
            <div class="box">
                <input id="email" placeholder="E-mail" type="email">
            </div>
            <div class="box">
                <input id="senha" placeholder="Senha" type="password">
            </div>
            <button type="submit">Cadastrar</button>
        </form>

    </main>

    <script>
        const form = document.getElementById("cadastro");

        form.addEventListener("submit", function(salvar){
            salvar.preventDefault();
            const nome = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;

            const conta = {
                nome: nome,
                email: email,
                senha: senha
            };

            localStorage.setItem("perfil", JSON.stringify(conta));

            alert("Seu Cadastro foi realizado, confira o nosso site!");

            window.location.href = "site.html";
        });
    </script>
</body>
</html>
