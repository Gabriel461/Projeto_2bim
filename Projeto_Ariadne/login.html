<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="shortcut icon" href="https://cdn3.emoji.gg/emojis/93029-minecraft.png" type="image/x-icon">
</head>
<body>
    <main class="container">
        <form id="login">
            <h1>Login</h1>
            <div class="box">
                <input id="email" placeholder="E-mail" type="email" required>
            </div>
            <div class="box">
                <input id="senha" placeholder="Senha" type="password" required>
            </div>
            <button type="submit">entrar</button>
        </form>

    </main>

    <script src="../scripts/login.js"></script>
</body>
</html>
