<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
    <style>
       * {
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        
       } 
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: url(imagens/GOW.jpg);
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
        animation: trocarFundo 24s infinite;
    } 

    @keyframes trocarFundo {
    0%, 24% {
        background-image: url("imagens/GOW.jpg");
    }

    25%, 49% {
        background-image: url(imagens/cidade.jpg);
    }

    50%, 74% {
        background-image: url(imagens/minecraft.jpg);
    }

    75%, 100% {
        background-image: url(imagens/zelda.jpg);
    }
}

    .container {
        width: 420px;
        background-color: transparent;
        border: 3px solid  black;
        border-radius: 30px;
        padding: 30px;
        backdrop-filter: blur(5px);
    }

    .container h1 {
        font-size: 40px;
        text-align: center;
        color: black;
        
    }

    .box {
        position: relative;
        width: 100%;
        height: 50px;
        margin: 30px;
    }

    .box input{
        width: 100%;
        height: 100%;
        background-color: transparent;
        border: none;
        border-radius: 20px ;
        font-size: 20px;
        color: white;

    }

    .box input::placeholder {
        color: black;
    }


    button {
        width: 100%;
        height: 50px;
        font-size: 20px;
        border-radius: 20px;
        border: black;
        cursor: pointer;
        color: white;
        background-color: black;
    }

    </style>
</head>
<body>
    <main class="container">
        <form>
            <h1>Login</h1>
            <div class="box">
                <input placeholder="E-mail" type="email" required>
            </div>
            <div class="box">
                <input placeholder="Senha" type="password" required>
            </div>
            <button type="submit">entrar</button>
        </form>

    </main>

    <script> 


    </script>
</body>
</html>
